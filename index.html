<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Séquenceur Mobile</title>
    <style>
        body { 
            background: #000; 
            color: #555; 
            font-family: sans-serif; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden; /* Empêche de scroller */
        }
        #launcher { 
            position: absolute;
            width: 100%; 
            height: 100%; 
            background: transparent; 
            border: none; 
            cursor: pointer; 
            z-index: 9999; /* Reste toujours au-dessus pour capter le clic */
        }
        h1 { font-size: 2rem; letter-spacing: 2px; text-transform: lowercase; position: relative; z-index: 1; }
        
        /* Style des mini-fenêtres qui vont apparaître */
        .hacker-frame {
            position: absolute;
            width: 80%;
            height: 40%;
            border: 2px solid #ff4757;
            box-shadow: 0 0 15px rgba(255, 71, 87, 0.4);
            background: #fff;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <button id="launcher"></button>
    <h1 id="main-text">cliquer</h1>

    <script>
        // Liste de sites (voir la note importante plus bas)
        const sites = [
            'https://www.example.com',
            'https://www.bing.com',
            'https://fr.wikipedia.org'
        ];

        let count = 0;
        const limit = 50; // Limité à 50 pour ne pas faire crasher totalement le téléphone

        function spawnIframe() {
            if (count >= limit) return;

            // Création d'une nouvelle mini-fenêtre (Iframe)
            const frame = document.createElement('iframe');
            frame.src = sites[count % sites.length];
            frame.className = 'hacker-frame';

            // Positionnement aléatoire sur l'écran pour un effet chaotique
            frame.style.top = Math.floor(Math.random() * 60) + '%';
            frame.style.left = Math.floor(Math.random() * 20) + '%';
            frame.style.zIndex = count + 10; // Empile les fenêtres les unes sur les autres

            // Injection dans la page
            document.body.appendChild(frame);

            count++;
            
            // Vitesse : une nouvelle fenêtre toutes les 150 millisecondes
            setTimeout(spawnIframe, 150);
        }

        document.getElementById('launcher').onclick = function() {
            this.style.display = 'none'; // Désactive le bouton
            document.getElementById('main-text').style.opacity = '0.05'; 
            spawnIframe();
        };
    </script>
</body>
</html>
